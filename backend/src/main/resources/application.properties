spring.datasource.url=jdbc:postgresql://localhost:5432/nivah
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
jwt.secret=${JWT_SECRET:NivahSecretKeyForJWTTokenGenerationThatIsLongEnoughForHS256Algorithm2024}
jwt.expiration=604800000
server.port=8080

app.frontend.url=${FRONTEND_URL:https://nivah.vercel.app}
google.client-id=${GOOGLE_CLIENT_ID:}

app.mail.from=${MAIL_FROM:noreply@nivah.app}
brevo.api.key=${BREVO_API_KEY:}
