spring.datasource.url=jdbc:postgresql://localhost:5432/nivah
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
jwt.secret=${JWT_SECRET:NivahSecretKeyForJWTTokenGenerationThatIsLongEnoughForHS256Algorithm2024}
jwt.expiration=604800000
server.port=8080

app.frontend.url=${FRONTEND_URL:https://nivah.vercel.app}
google.client-id=${GOOGLE_CLIENT_ID:}

app.mail.from=${MAIL_FROM:onboarding@resend.dev}

# Resend SMTP relay
spring.mail.host=smtp.resend.com
spring.mail.port=465
spring.mail.username=resend
spring.mail.password=${RESEND_API_KEY:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
